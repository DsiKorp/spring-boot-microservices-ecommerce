spring:
  # 🚀 Java 21 Performance
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        "[dialect]": org.hibernate.dialect.PostgreSQLDialect

order:
  enabled: true
management:
  endpoints:
    web:
      exposure:
        # incluye endpoints por defecto
        include: "refresh, health"

server:
  port: ${SERVER_PORT_ORDER}

inventory:
  service:
    url: ${SERVER_URL_INVENTORY}

