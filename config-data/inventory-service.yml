spring:
  application:
    name: inventory-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL}
    fetchRegistry: true
    registerWithEureka: true
# Variable ejemplo actuator
inventory:
  allow-back-orders: false
# actuator
management:
  endpoints:
    web:
      exposure:
        # incluye endpoints por defecto
        include: "refresh, health"
server:
  port: ${SERVER_PORT_INVENTORY}