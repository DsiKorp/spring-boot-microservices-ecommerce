spring:
  application:
    name: inventory-service
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL}
    fetchRegistry: true
    registerWithEureka: true
# Variable ejemplo actuator
inventory:
  allow-back-orders: false
management:
  tracing:
    sampling:
      probability: 1.0  # Captura el 100% de las trazas para desarrollo
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OPENTELEMETRY_OTLP_ENDPOINT}/traces
    logging:
      export:
        otlp:
          endpoint: ${OPENTELEMETRY_OTLP_ENDPOINT}/logs
  otlp:
    metrics:
      export:
        url: ${OPENTELEMETRY_OTLP_ENDPOINT}/metrics
  # actuator
  endpoints:
    web:
      exposure:
        # incluye endpoints por defecto
        include: "refresh, health, prometheus"
# ✅ CORRELACIÓN DE LOGS (TraceID y SpanID en consola de IntelliJ/Docker)
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{trace_id:-},%X{span_id:-}]"
server:
  port: ${SERVER_PORT_INVENTORY}